<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portafolio - Sebastian Sotelo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
    }

    .perfil {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .perfil h1 {
      margin: 0 0 10px 0;
      color: #333;
    }

    .perfil p {
      margin: 4px 0;
      color: #555;
    }

    h2 {
      color: #333;
      border-bottom: 2px solid #4a90d9;
      padding-bottom: 6px;
    }

    .tarea {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tarea span {
      color: #333;
      font-size: 15px;
    }

    .tarea a {
      background: #4a90d9;
      color: white;
      padding: 6px 14px;
      border-radius: 5px;
      text-decoration: none;
      font-size: 14px;
    }

    .tarea a:hover {
      background: #357abd;
    }

    #mensaje {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="perfil">
    <h1>Sebastian Sotelo Zuñiga</h1>
    <p><strong>Matricula:</strong> 24041003</p>
    <p><strong>Grupo:</strong> J306</p>
    <p><strong>Materia:</strong> Programacion Web</p>
  </div>

  <h2>Mis Tareas</h2>
  <div id="lista">
    <p id="mensaje">Cargando tareas...</p>
  </div>

  <script>
    const API = "https://portafolio-backend-seven.vercel.app/";

    fetch(API + "/tareas")
      .then(res => res.json())
      .then(tareas => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        tareas.forEach(t => {
          lista.innerHTML += `
            <div class="tarea">
              <span>${t.titulo}</span>
              <a href="${t.url}" target="_blank">Ver tarea</a>
            </div>
          `;
        });
      })
      .catch(() => {
        document.getElementById("mensaje").textContent =
          "Error: no se pudo conectar con el servidor.";
      });
  </script>

</body>
</html>
